<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老王和朋友们 - 协作版</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #1e0b36, #0a0a2a, #0b2239);
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", STHeiti, sans-serif;
  }

  /* --- BGM 控制器 (黑胶唱片) --- */
  #bgm-toggle {
    position: absolute;
    top: 30px;
    right: 30px;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 8px 16px 8px 12px;
    border-radius: 30px;
    color: rgba(255, 255, 255, 0.9);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  }

  #bgm-toggle:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.4);
    transform: translateY(-2px);
  }

  .cd-icon {
    font-size: 18px;
    display: inline-block;
    animation: spin 4s linear infinite;
  }

  #bgm-toggle.paused .cd-icon {
    animation-play-state: paused;
    filter: grayscale(100%) opacity(0.5);
  }

  #bgm-toggle.paused {
    background: rgba(0, 0, 0, 0.2);
    border-color: rgba(255, 255, 255, 0.1);
  }

  @keyframes spin {
    100% { transform: rotate(360deg); }
  }

  /* 顶部跳动的音频频谱柱状图容器 */
  #visualizer-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 35vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
    z-index: 2;
    pointer-events: none;
    mask-image: linear-gradient(to top, transparent, black 10%);
    -webkit-mask-image: linear-gradient(to top, transparent, black 10%);
  }

  .bar {
    width: 8px;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 4px 4px 0 0;
    transform-origin: bottom;
    transition: height 0.1s ease;
    animation: idle-wave 1.5s infinite alternate ease-in-out;
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
  }

  @keyframes idle-wave {
    0% { height: 10px; }
    100% { height: 25px; }
  }

  h1 {
    text-align: center;
    margin-top: 15vh;
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    pointer-events: none;
    z-index: 10;
    position: relative;
  }

  .subtitle {
    text-align: center;
    font-size: 0.95rem;
    color: rgba(255,255,255,0.6);
    margin-top: 10px;
    pointer-events: none;
    z-index: 10;
    position: relative;
    letter-spacing: 1px;
  }
  
  .contribute-btn {
    display: inline-block;
    margin-top: 15px;
    padding: 5px 15px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    font-size: 12px;
    color: #4ade80;
    text-decoration: none;
    pointer-events: auto;
    transition: all 0.3s;
    background: rgba(0,0,0,0.2);
  }
  
  .contribute-btn:hover {
    background: rgba(74, 222, 128, 0.2);
    border-color: #4ade80;
    box-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
  }

  #bubble-container {
    position: absolute;
    top: 35vh;
    left: 0;
    width: 100vw;
    height: 65vh;
    z-index: 1;
  }

  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(100% 100% at 30% 30%, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 
      inset 5px 5px 15px rgba(255, 255, 255, 0.4),
      inset -5px -5px 15px rgba(0, 0, 0, 0.3),
      0 8px 32px rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: float infinite ease-in-out;
  }

  .bubble:hover {
    transform: scale(1.2) translateY(-10px) !important;
    background: radial-gradient(100% 100% at 30% 30%, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
    border: 1px solid rgba(255, 255, 255, 0.6);
    box-shadow: 
      inset 8px 8px 20px rgba(255, 255, 255, 0.5),
      inset -5px -5px 15px rgba(0, 0, 0, 0.2),
      0 15px 40px rgba(0, 0, 0, 0.6), 
      0 0 30px rgba(255, 255, 255, 0.2);
    z-index: 100;
  }

  .bubble.playing {
    background: radial-gradient(100% 100% at 30% 30%, rgba(0, 255, 128, 0.3) 0%, rgba(0, 255, 128, 0.1) 50%, rgba(0, 255, 128, 0) 100%);
    border-color: rgba(0, 255, 128, 0.6);
    box-shadow: 
      inset 5px 5px 15px rgba(0, 255, 128, 0.5),
      inset -5px -5px 15px rgba(0, 0, 0, 0.4),
      0 0 50px rgba(0, 255, 128, 0.4);
    animation: pulse-3d 2s infinite;
  }

  .bubble .title {
    font-size: 13px;
    font-weight: 500;
    text-shadow: 0 2px 4px rgba(0,0,0,0.9);
    pointer-events: none;
    padding: 8px;
    line-height: 1.4;
    white-space: pre-wrap;
  }

  .bubble .contributor {
    display: block;
    font-size: 9px;
    color: #a7f3d0;
    margin-top: 4px;
    opacity: 0.8;
  }

  @keyframes float {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-25px) rotate(3deg); }
    100% { transform: translateY(0px) rotate(0deg); }
  }

  @keyframes pulse-3d {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); box-shadow: inset 8px 8px 20px rgba(0, 255, 128, 0.6), inset -5px -5px 15px rgba(0, 0, 0, 0.4), 0 0 60px rgba(0, 255, 128, 0.6); }
    100% { transform: scale(1); }
  }

  #player {
    position: fixed;
    bottom: -120px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 20, 30, 0.85);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 15px 30px;
    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
    transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    z-index: 200;
    width: 80%;
    max-width: 400px;
  }

  #player.active {
    bottom: 40px;
  }

  #now-playing {
    font-size: 14px;
    color: #00ff80;
    font-weight: bold;
    letter-spacing: 1px;
  }
  
  #contributor-tag {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    margin-top: -8px;
  }

  audio {
    width: 100%;
    height: 35px;
    outline: none;
  }

  .music-note {
    position: absolute;
    font-size: 24px;
    color: rgba(255, 255, 255, 0.9);
    pointer-events: none;
    animation: floatUp 1.5s ease-out forwards;
    z-index: 50;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(0.8) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-120px) scale(1.5) rotate(20deg); }
  }

  /* Loading 提示 */
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    letter-spacing: 2px;
    z-index: 10;
  }
</style>
</head>
<body>

<!-- BGM 音乐标签 -->
<audio id="bgm-element" src="https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview112/v4/43/4e/ce/434ecece-62a0-04fc-8898-55e91c5f3e75/mzaf_1137360759286248328.plus.aac.p.m4a" loop></audio>

<!-- 右上角 BGM 控制按钮 -->
<div id="bgm-toggle" class="paused">
  <span class="cd-icon">💿</span>
  <span id="bgm-text">BGM: If - Bread</span>
</div>

<div id="visualizer-container"></div>

<h1>✨ 老王和朋友们 ✨</h1>
<div class="subtitle">
  <div>If a picture paints a thousand words...</div>
  <!-- ★ 增加了一个提交歌曲的传送门，直接链接到你的 Github 仓库 -->
  <a href="https://github.com/CZ-186/mymusic/edit/main/playlist.json" target="_blank" class="contribute-btn">🎵 点击这里，向星空发射你的气泡 (提交歌曲)</a>
</div>

<div id="loading">正在连接星空歌单...</div>
<div id="bubble-container"></div>

<div id="player">
  <div id="now-playing">准备播放...</div>
  <div id="contributor-tag"></div>
  <audio id="audio-element" controls></audio>
</div>

<script>
  const container = document.getElementById('bubble-container');
  const player = document.getElementById('player');
  const audioElement = document.getElementById('audio-element');
  const nowPlaying = document.getElementById('now-playing');
  const contributorTag = document.getElementById('contributor-tag');
  const visualizerContainer = document.getElementById('visualizer-container');
  const loadingText = document.getElementById('loading');

  const bgmElement = document.getElementById('bgm-element');
  const bgmToggle = document.getElementById('bgm-toggle');
  const bgmText = document.getElementById('bgm-text');

  let currentBubble = null;
  let isBubblePlaying = false;
  let isBgmPlaying = false;
  let hasUserInteracted = false;

  // --- ★ 核心改变：动态从 JSON 获取歌单 ---
  fetch('playlist.json')
    .then(response => {
      if (!response.ok) throw new Error('找不到歌单文件');
      return response.json();
    })
    .then(data => {
      loadingText.style.display = 'none';
      initBubbles(data.songs);
    })
    .catch(err => {
      // 如果本地没起服务器直接点开 html 可能会跨域报错，这里给个降级后备数据，确保预览不崩
      loadingText.style.display = 'none';
      initBubbles([
        { title: '告白气球\n(Cover)', src: 'https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview116/v4/49/f1/46/49f14662-a27c-9a91-13c1-ccfc02de6724/mzaf_11188127351008075312.plus.aac.p.m4a', size: 90, contributor: '王同学' },
        { title: '心愿便利贴', src: 'https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview125/v4/e4/35/92/e43592c2-561a-57c3-cea1-a15ed1f3224e/mzaf_4500727031117294611.plus.aac.p.m4a', size: 80, contributor: '王同学' }
      ]);
      console.warn("使用备用歌单", err);
    });

  // --- 初始化气泡界面 ---
  function initBubbles(songs) {
    const placedPos = [];
    
    function getSafePos(size) {
      const paddingX = 20, paddingY = 20; 
      const containerWidth = window.innerWidth;
      const startY = 30; 
      const containerHeight = window.innerHeight * 0.65;

      for (let attempts = 0; attempts < 100; attempts++) {
        const x = paddingX + Math.random() * (containerWidth - size - paddingX * 2);
        const y = startY + Math.random() * (containerHeight - size - startY - paddingY);
        
        let safe = true;
        for (const p of placedPos) {
          const dx = (x + size/2) - (p.x + p.size/2);
          const dy = (y + size/2) - (p.y + p.size/2);
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < (size/2 + p.size/2) * 0.8) {
            safe = false; break;
          }
        }
        if (safe) { placedPos.push({x, y, size}); return { x, y }; }
      }
      return { 
        x: paddingX + Math.random() * (containerWidth - size - paddingX * 2),
        y: startY + Math.random() * (containerHeight - size - startY - paddingY) 
      };
    }

    songs.forEach((song) => {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.style.width = song.size + 'px';
      bubble.style.height = song.size + 'px';
      
      const pos = getSafePos(song.size);
      bubble.style.left = pos.x + 'px';
      bubble.style.top = pos.y + 'px';
      
      const delay = Math.random() * 4;
      const duration = 4 + Math.random() * 4;
      bubble.style.animationDuration = duration + 's';
      bubble.style.animationDelay = '-' + delay + 's';

      const title = document.createElement('div');
      title.className = 'title';
      
      // 加入提供者的名字显示 (如果没有就默认不显示)
      let innerHtml = song.title.replace('\n', '<br>');
      if (song.contributor) {
        innerHtml += `<span class="contributor">by ${song.contributor}</span>`;
      }
      title.innerHTML = innerHtml;
      bubble.appendChild(title);

      bubble.addEventListener('click', (e) => {
        if (isBgmPlaying) pauseBGM();

        if (currentBubble) currentBubble.classList.remove('playing');
        bubble.classList.add('playing');
        currentBubble = bubble;

        player.classList.add('active');
        nowPlaying.innerText = '正在播放: ' + song.title.replace('\n', ' ');
        contributorTag.innerText = song.contributor ? `上传者: ${song.contributor}` : '';
        
        audioElement.src = song.src;
        audioElement.play();

        createNotes(e.clientX, e.clientY);
      });

      container.appendChild(bubble);
    });
  }

  // --- 动效与交互 ---
  const numBars = Math.floor(window.innerWidth / 12);
  const bars = [];
  for (let i = 0; i < numBars; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = (10 + Math.random() * 20) + 'px';
    bar.style.animationDelay = (Math.random() * -2) + 's';
    visualizerContainer.appendChild(bar);
    bars.push(bar);
  }

  function updateVisualizer() {
    const isAnyPlaying = isBubblePlaying || isBgmPlaying;
    if (!isAnyPlaying) {
      bars.forEach(bar => { bar.style.animation = 'idle-wave 1.5s infinite alternate ease-in-out'; });
      return;
    }
    bars.forEach(bar => {
      bar.style.animation = 'none';
      const centerFactor = 1 - Math.abs((bars.indexOf(bar) / numBars) - 0.5) * 2;
      const newHeight = 10 + Math.random() * 100 * (0.4 + centerFactor * 0.6);
      bar.style.height = newHeight + 'px';
      const opacity = 0.3 + (newHeight / 150) * 0.7;
      bar.style.background = `rgba(255, 255, 255, ${opacity})`;
    });
    if (isAnyPlaying) setTimeout(updateVisualizer, 150);
  }

  function playBGM() {
    bgmElement.play().then(() => {
      isBgmPlaying = true;
      bgmToggle.classList.remove('paused');
      bgmText.innerText = 'BGM: If - Bread';
      updateVisualizer();
    }).catch(e => console.log('BGM auto-play prevented'));
  }

  function pauseBGM() {
    bgmElement.pause();
    isBgmPlaying = false;
    bgmToggle.classList.add('paused');
    bgmText.innerText = 'BGM 已暂停';
    updateVisualizer();
  }

  document.body.addEventListener('click', (e) => {
    if (e.target.closest('.bubble') || e.target.closest('#bgm-toggle') || e.target.closest('#player') || e.target.closest('.contribute-btn')) return;
    if (!hasUserInteracted) {
      hasUserInteracted = true;
      if (!isBubblePlaying) playBGM();
    }
  }, { once: true });

  bgmToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    hasUserInteracted = true;
    if (isBgmPlaying) {
      pauseBGM();
    } else {
      if (isBubblePlaying) {
        audioElement.pause();
        if (currentBubble) currentBubble.classList.remove('playing');
        player.classList.remove('active');
        isBubblePlaying = false;
      }
      playBGM();
    }
  });

  function createNotes(x, y) {
    const notes = ['♪', '♫', '♬', '♩'];
    for(let i=0; i<3; i++) {
      const note = document.createElement('div');
      note.className = 'music-note';
      note.innerText = notes[Math.floor(Math.random() * notes.length)];
      note.style.left = (x - 15 + Math.random()*30) + 'px';
      note.style.top = (y - 15 + Math.random()*30) + 'px';
      note.style.animationDuration = (1 + Math.random()) + 's';
      document.body.appendChild(note);
      setTimeout(() => note.remove(), 1500);
    }
  }

  audioElement.addEventListener('ended', () => {
    if (currentBubble) currentBubble.classList.remove('playing');
    nowPlaying.innerText = '播放结束';
    isBubblePlaying = false;
    updateVisualizer();
  });
  audioElement.addEventListener('pause', () => { isBubblePlaying = false; updateVisualizer(); });
  audioElement.addEventListener('play', () => { isBubblePlaying = true; updateVisualizer(); });
</script>
</body>
</html>
